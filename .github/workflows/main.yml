name: Ultimate Video Downloader (m3u8 + ffmpeg)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه ویدیو (مثل https://www.hub.com/view_video.php?viewkey=...)'
        required: true
        type: string
      output_folder:
        description: 'پوشه ذخیره'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  ultimate-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq curl wget
          pip install -U yt-dlp

      - name: Extract m3u8 link from page
        id: extract
        run: |
          URL="${{ github.event.inputs.url }}"
          mkdir -p "${{ github.event.inputs.output_folder }}"
          
          # روش 1:直接用 yt-dlp 抓 m3u8
          echo "🔍 Trying to extract m3u8 with yt-dlp..."
          yt-dlp --dump-json "$URL" > video_info.json 2>/dev/null || true
          
          # استخراج لینک m3u8 از خروجی yt-dlp
          M3U8_URL=$(cat video_info.json 2>/dev/null | jq -r '.formats[]?.url | select(contains(".m3u8"))' 2>/dev/null | head -1)
          
          # روش 2: اگر پیدا نشد، با grep از صفحه HTML
          if [ -z "$M3U8_URL" ]; then
            echo "🔍 Method 2: Searching HTML for m3u8..."
            M3U8_URL=$(curl -sL "$URL" | grep -oP 'https?://[^"\047]+\.m3u8[^"\047]*' | head -1)
          fi
          
          # روش 3: جستجو در فایل‌های جاوااسکریپت
          if [ -z "$M3U8_URL" ]; then
            echo "🔍 Method 3: Searching JavaScript files..."
            JS_URLS=$(curl -sL "$URL" | grep -oP 'src="[^"]+\.js"' | sed 's/src="//;s/"//')
            for js in $JS_URLS; do
              FULL_JS_URL=$(echo "$js" | grep -q '^http' && echo "$js" || echo "$(dirname "$URL")/$js")
              M3U8_URL=$(curl -sL "$FULL_JS_URL" | grep -oP 'https?://[^"\047]+\.m3u8[^"\047]*' | head -1)
              [ -n "$M3U8_URL" ] && break
            done
          fi
          
          if [ -z "$M3U8_URL" ]; then
            echo "❌ No m3u8 link found!"
            exit 1
          fi
          
          echo "✅ Found m3u8: $M3U8_URL"
          echo "m3u8_url=$M3U8_URL" >> $GITHUB_OUTPUT

      - name: Download with ffmpeg (قطعی)
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          M3U8_URL="${{ steps.extract.outputs.m3u8_url }}"
          
          # دانلود با ffmpeg - این قطعی‌ترین روش است
          ffmpeg -i "$M3U8_URL" -c copy -bsf:a aac_adtstoasc -movflags +faststart output.mp4 -y
          
          # بررسی اینکه فایل ساخته شده باشد
          if [ -f "output.mp4" ] && [ $(stat -c%s "output.mp4") -gt 100000 ]; then
            echo "✅ Download successful! File size: $(stat -c%s output.mp4) bytes"
            echo "downloaded_file=output.mp4" >> $GITHUB_OUTPUT
          else
            echo "❌ ffmpeg failed, trying yt-dlp as fallback..."
            yt-dlp -f best -o "output.mp4" "$M3U8_URL"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-mp4
          path: ${{ github.event.inputs.output_folder }}/output.mp4
          retention-days: 90

      - name: Commit to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "Add downloaded video [skip ci]" || echo "Nothing to commit"
          git push || echo "Push failed"
